name: Release Workflow (Windows)

permissions:
  contents: write

on:
  workflow_call:
  push:
    tags: [ "v*" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtmultimedia
          cache: true

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
            ${{ github.workspace }}/vcpkg/buildtrees
            ${{ github.workspace }}/vcpkg/packages
          key: vcpkg-windows-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-windows-

      - name: vcpkg (manifest mode)
        uses: johnwason/vcpkg-action@v7
        with:
          manifest-dir: ${{ github.workspace }}
          triplet: x64-windows
          token: ${{ github.token }}
          extra-args: --clean-buildtrees-after-build




      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"



      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --prefix ${{ github.workspace }}/install



      - name: Package
        shell: pwsh
        run: |
          # Debug: find where vcpkg DLLs actually landed
          Write-Host "=== vcpkg_installed ===" 
          if (Test-Path "${{ github.workspace }}/vcpkg_installed/x64-windows/bin") {
            Get-ChildItem "${{ github.workspace }}/vcpkg_installed/x64-windows/bin/*.dll" | Select-Object Name
          } else { Write-Host "vcpkg_installed not found" }

          Write-Host "=== vcpkg/installed ===" 
          if (Test-Path "${{ github.workspace }}/vcpkg/installed/x64-windows/bin") {
            Get-ChildItem "${{ github.workspace }}/vcpkg/installed/x64-windows/bin/*.dll" | Select-Object Name
          } else { Write-Host "vcpkg/installed not found" }

          # Deploy Qt dependencies
          & "${{ env.QT_ROOT_DIR }}/bin/windeployqt.exe" `
            --qmldir "${{ github.workspace }}/qml" `
            --release `
            "${{ github.workspace }}/install/bin/liveTextify.exe"

          # Copy vcpkg runtime DLLs — update path once debug above confirms location
          Copy-Item "${{ github.workspace }}/vcpkg/installed/x64-windows/bin/*.dll" `
            -Destination "${{ github.workspace }}/install/bin/" `
            -Force

          Compress-Archive `
            -Path "${{ github.workspace }}/install/bin/*" `
            -DestinationPath "${{ github.workspace }}/liveTextify-windows-x64.zip"



      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liveTextify-windows
          path: liveTextify-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: liveTextify-windows-x64.zip

