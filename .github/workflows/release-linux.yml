name: Release Workflow (Linux)

permissions:
  contents: write


on:
  workflow_call:
  push:
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libfuse2 \
            ninja-build \
            wget

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: linux
          target: desktop
          modules: qtmultimedia
          cache: true

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
            ${{ github.workspace }}/vcpkg/buildtrees
            ${{ github.workspace }}/vcpkg/packages
          key: vcpkg-ubuntu-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-ubuntu-

      - name: vcpkg (manifest mode)
        uses: johnwason/vcpkg-action@v7
        with:
          manifest-dir: ${{ github.workspace }}
          triplet: x64-linux
          token: ${{ github.token }}
          extra-args: --clean-buildtrees-after-build

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --prefix ${{ github.workspace }}/install

      - name: Install linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Package AppImage
        env:
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
          QML_SOURCES_PATHS: ${{ github.workspace }}/qml
          OUTPUT: liveTextify-linux-x64.AppImage
        run: |
          # Nuke all SQL drivers except SQLite — Mimer/ODBC/etc lack their native libs on the runner
          find ${{ env.QT_ROOT_DIR }}/plugins/sqldrivers/ -name "*.so" ! -name "libqsqlite.so" -delete

          # Verify what's left
          echo "Remaining sqldrivers:"
          ls ${{ env.QT_ROOT_DIR }}/plugins/sqldrivers/

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable install/bin/liveTextify \
            --desktop-file packaging/linux/liveTextify.desktop \
            --icon-file packaging/linux/liveTextify.png \
            --plugin qt \
            --output appimage



      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liveTextify-ubuntu
          path: liveTextify-linux-x64.AppImage

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: liveTextify-linux-x64.AppImage

